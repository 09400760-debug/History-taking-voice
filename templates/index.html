<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Realtime Voice Case</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 950px;
      margin: 40px auto;
      padding: 0 20px;
    }
    button {
      padding: 10px 16px;
      margin-right: 10px;
      margin-bottom: 10px;
      font-size: 16px;
    }
    #status {
      margin: 12px 0;
      font-weight: bold;
    }
    #transcript {
      border: 1px solid #ccc;
      padding: 16px;
      min-height: 320px;
      white-space: pre-wrap;
      background: #fafafa;
      overflow-y: auto;
    }
    .small {
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Realtime Voice History-Taking</h1>
  <p class="small">This page runs the live caregiver interview.</p>

  <div id="status">Not connected</div>

  <div style="margin-top:20px;">
    <button id="startBtn">Start Voice Session</button>
    <button id="stopBtn" disabled>Stop Session</button>
  </div>

  <h3>Live transcript</h3>
  <div id="transcript"></div>

  <audio id="remoteAudio" autoplay></audio>

  <script>
    let pc = null;
    let dc = null;
    let localStream = null;
    let sessionFinished = false;
    let openingLineSeen = false;
    let transcriptLines = [];

    const statusEl = document.getElementById("status");
    const transcriptEl = document.getElementById("transcript");
    const remoteAudioEl = document.getElementById("remoteAudio");

    const FINAL_LINE =
      "thank you. please click stop session, then return to the main app for feedback and scoring.";

    function addTranscriptLine(speaker, text) {
      if (!text) return;
      transcriptLines.push({ speaker, text });
      transcriptEl.textContent += `${speaker}: ${text}\n`;
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    async function saveTranscriptToServer() {
      try {
        const payload = {
          transcript_lines: transcriptLines,
          transcript_text: transcriptLines.map(x => `${x.speaker}: ${x.text}`).join("\n")
        };

        await fetch("/save_transcript", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
      } catch (err) {
        console.error("Could not save transcript:", err);
      }
    }

    function getQueryParam(name, fallback = "") {
      const params = new URLSearchParams(window.location.search);
      return params.get(name) || fallback;
    }

    function normalizeText(text) {
      return text.toLowerCase().trim().replace(/[.,!?]/g, "");
    }

    async function startSession() {
      try {
        sessionFinished = false;
        openingLineSeen = false;
        transcriptLines = [];
        transcriptEl.textContent = "";
        statusEl.textContent = "Accessing microphone...";

        const age_group = getQueryParam("age_group", "Infant");
        const system = getQueryParam("system", "Respiratory");
        const case_summary = getQueryParam("case_summary", "");
        const opening_line = getQueryParam("opening_line", "Hello, who am I speaking to?");
        const normalizedOpeningLine = normalizeText(opening_line);

        pc = new RTCPeerConnection();

        pc.ontrack = (event) => {
          remoteAudioEl.srcObject = event.streams[0];
        };

        pc.onconnectionstatechange = () => {
          if (!sessionFinished) {
            statusEl.textContent = `Connection state: ${pc.connectionState}`;
          }
        };

        dc = pc.createDataChannel("oai-events");

        dc.onopen = () => {
          if (!sessionFinished) {
            statusEl.textContent = "Connected";
          }
        };

        dc.onmessage = async (event) => {
          try {
            const msg = JSON.parse(event.data);
            console.log("Realtime event:", msg);

            if (msg.type === "conversation.item.input_audio_transcription.completed") {
              if (!sessionFinished) {
                addTranscriptLine("Student", msg.transcript);
              }
              return;
            }

            if (msg.type === "response.output_item.done") {
              const item = msg.item;
              if (item && item.content) {
                const transcriptPart = item.content.find(c => c.transcript);
                if (transcriptPart && transcriptPart.transcript) {
                  const botText = transcriptPart.transcript;
                  const normalizedBotText = normalizeText(botText);

                  if (sessionFinished) {
                    return;
                  }

                  if (normalizedBotText === normalizedOpeningLine) {
                    if (!openingLineSeen) {
                      openingLineSeen = true;
                      addTranscriptLine("Bot", botText);
                    }
                    return;
                  }

                  addTranscriptLine("Bot", botText);

                  const lower = botText.toLowerCase().trim();

                  if (lower === "would you like to move to preceptor mode?") {
                    statusEl.textContent = "Preceptor handoff offered";
                    return;
                  }

                  if (
                    lower.includes("based on the history, what is your assessment") &&
                    lower.includes("what are your differential diagnoses")
                  ) {
                    statusEl.textContent = "Preceptor mode";
                    return;
                  }

                  if (lower === FINAL_LINE) {
                    sessionFinished = true;
                    statusEl.textContent = "Session complete";
                    await saveTranscriptToServer();
                    return;
                  }
                }
              }
              return;
            }

            if (msg.type === "error") {
              console.error("Realtime error:", msg);
              if (!sessionFinished) {
                statusEl.textContent = "Realtime error - check console";
              }
            }
          } catch (e) {
            console.error("Event parse error", e, event.data);
          }
        };

        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        statusEl.textContent = "Creating WebRTC offer...";
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        statusEl.textContent = "Connecting to server...";
        const query = new URLSearchParams({
          age_group,
          system,
          case_summary,
          opening_line
        }).toString();

        const sdpResponse = await fetch(`/session?${query}`, {
          method: "POST",
          body: offer.sdp,
          headers: {
            "Content-Type": "application/sdp"
          }
        });

        if (!sdpResponse.ok) {
          const errText = await sdpResponse.text();
          throw new Error(`SDP exchange failed: ${sdpResponse.status} ${errText}`);
        }

        const answer = {
          type: "answer",
          sdp: await sdpResponse.text()
        };

        await pc.setRemoteDescription(answer);

        document.getElementById("startBtn").disabled = true;
        document.getElementById("stopBtn").disabled = false;
        statusEl.textContent = "Live session running";

      } catch (err) {
        console.error(err);
        statusEl.textContent = `Error: ${err.message}`;
      }
    }

    async function stopSession() {
      if (dc) {
        try { dc.close(); } catch {}
        dc = null;
      }
      if (pc) {
        try { pc.close(); } catch {}
        pc = null;
      }
      if (localStream) {
        localStream.getTracks().forEach(track => {
          try { track.stop(); } catch {}
        });
        localStream = null;
      }

      document.getElementById("startBtn").disabled = false;
      document.getElementById("stopBtn").disabled = true;

      if (sessionFinished) {
        statusEl.textContent = "Session complete";
      } else {
        statusEl.textContent = "Disconnected";
      }
    }

    document.getElementById("startBtn").addEventListener("click", startSession);
    document.getElementById("stopBtn").addEventListener("click", stopSession);
  </script>
</body>
</html>
