<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Realtime Voice Case</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 950px;
      margin: 40px auto;
      padding: 0 20px;
    }
    button, a.button-link {
      display: inline-block;
      padding: 10px 16px;
      margin-right: 10px;
      margin-bottom: 10px;
      font-size: 16px;
      text-decoration: none;
      border: 1px solid #ccc;
      background: #f5f5f5;
      color: black;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #status {
      margin: 12px 0;
      font-weight: bold;
    }
    #transcript {
      border: 1px solid #ccc;
      padding: 16px;
      min-height: 320px;
      background: #fafafa;
      overflow-y: auto;
    }
    .line {
      white-space: pre-wrap;
      margin-bottom: 6px;
    }
    .small {
      color: #666;
      font-size: 14px;
    }
    #returnSection, #warningSection {
      display: none;
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
    }
    #returnSection {
      border: 1px solid #d9d9d9;
      background: #f9f9f9;
    }
    #warningSection {
      border: 1px solid #e0b4b4;
      background: #fff6f6;
    }
  </style>
</head>
<body>
  <h1>Realtime Voice History-Taking</h1>
  <p class="small">This page runs the live caregiver interview.</p>

  <div id="status">Preparing session...</div>

  <div style="margin-top:20px;">
    <button id="startBtn" disabled>Start Voice Session</button>
    <button id="stopBtn" disabled>Stop Session</button>
  </div>

  <div id="returnSection">
    <p><strong>Session complete.</strong> Returning to the main app.</p>
    <a id="returnBtn" class="button-link" href="#">Return to main app</a>
  </div>

  <div id="warningSection">
    <p><strong>Session stopped before completion.</strong> You can return to the main app.</p>
    <a id="manualReturnBtn" class="button-link" href="#">Return to main app</a>
  </div>

  <h3>Live transcript</h3>
  <div id="transcript"></div>

  <audio id="remoteAudio" autoplay></audio>

  <script>
    let pc = null;
    let dc = null;
    let localStream = null;
    let sessionFinished = false;
    let openingLineSeen = false;
    let transcriptLines = [];
    let transcriptSaved = false;
    let stopInProgress = false;
    let autoStarted = false;

    let sessionStartTime = null;
    let sessionEndTime = null;
    let lastStudentSpeechTime = null;
    let warningIssued = false;
    let pendingAutoFeedback = "0";
    let timeoutReason = null;
    let timerHandle = null;
    let awaitingFeedbackChoice = false;

    const statusEl = document.getElementById("status");
    const transcriptEl = document.getElementById("transcript");
    const remoteAudioEl = document.getElementById("remoteAudio");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const returnSection = document.getElementById("returnSection");
    const warningSection = document.getElementById("warningSection");
    const returnBtn = document.getElementById("returnBtn");
    const manualReturnBtn = document.getElementById("manualReturnBtn");

    const ALLOWED_RETURN_ORIGINS = [
      "https://history-takinggit-eexzk8appdm3vzfej2vtuzn.streamlit.app"
    ];

    const PRECEPTOR_INVITE_LINE = "Would you like to move to preceptor mode?";
    const DIAGNOSIS_QUESTION = "What is your diagnosis?";
    const DIFFERENTIALS_QUESTION = "What are your differential diagnoses?";
    const FEEDBACK_QUESTION = "Would you like to receive your assessment now?";

    const INACTIVITY_LIMIT_MS = 5 * 60 * 1000;
    const WARNING_AT_MS = 25 * 60 * 1000;
    const HARD_STOP_AT_MS = 30 * 60 * 1000;

    function getQueryParam(name, fallback = "") {
      const params = new URLSearchParams(window.location.search);
      return params.get(name) || fallback;
    }

    function normalizeText(text) {
      return (text || "")
        .toLowerCase()
        .trim()
        .replace(/[.,!?']/g, "")
        .replace(/\s+/g, " ");
    }

    function isoNow() {
      return new Date().toISOString();
    }

    function durationSeconds(startIso, endIso) {
      if (!startIso || !endIso) return null;
      const start = new Date(startIso).getTime();
      const end = new Date(endIso).getTime();
      if (Number.isNaN(start) || Number.isNaN(end)) return null;
      return Math.max(0, Math.round((end - start) / 1000));
    }

    function elapsedMs() {
      if (!sessionStartTime) return 0;
      return Math.max(0, new Date().getTime() - new Date(sessionStartTime).getTime());
    }

    function msSinceLastStudentSpeech() {
      if (!lastStudentSpeechTime) return elapsedMs();
      return Math.max(0, new Date().getTime() - new Date(lastStudentSpeechTime).getTime());
    }

    function speakLocalMessage(text) {
      try {
        if (!("speechSynthesis" in window)) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-ZA";
        window.speechSynthesis.speak(utterance);
      } catch (err) {
        console.warn("speechSynthesis unavailable", err);
      }
    }

    function isYes(text) {
      const t = normalizeText(text);
      const yesValues = new Set([
        "yes", "y", "yeah", "yep", "okay", "ok", "sure", "please do",
        "go ahead", "continue", "yes please", "okay yes", "ok yes"
      ]);
      return yesValues.has(t) || t.startsWith("yes ");
    }

    const SESSION_ID = getQueryParam("session_id", "");
    const STUDY_NUMBER = getQueryParam("study_number", "");
    const INTERACTION_MODE = getQueryParam("interaction_mode", "");
    const AGE_GROUP = getQueryParam("age_group", "Infant");
    const SYSTEM = getQueryParam("system", "Respiratory");
    const CAREGIVER_NAME = getQueryParam("caregiver_name", "Zanele");
    const CAREGIVER_GENDER = getQueryParam("caregiver_gender", "female");
    const CAREGIVER_ROLE = getQueryParam("caregiver_role", "mother");
    const CHILD_NAME = getQueryParam("child_name", "");
    const PRESENTING_COMPLAINT = getQueryParam("presenting_complaint", "");
    const CASE_SUMMARY = getQueryParam("case_summary", "");
    const OPENING_LINE = getQueryParam(
      "opening_line",
      `Hello doctor, I'm ${CAREGIVER_NAME}, the child's ${CAREGIVER_ROLE}.`
    );

    function buildSafeReturnUrl(autoFeedback = "0") {
      const rawReturnUrl = getQueryParam("return_url", "");
      if (!rawReturnUrl) return "";

      try {
        const url = new URL(rawReturnUrl);
        if (!ALLOWED_RETURN_ORIGINS.includes(url.origin)) {
          console.warn("Blocked non-whitelisted return_url:", rawReturnUrl);
          return "";
        }
        url.searchParams.set("import_voice", "1");
        url.searchParams.set("auto_feedback", autoFeedback);
        if (SESSION_ID) {
          url.searchParams.set("session_id", SESSION_ID);
        }
        return url.toString();
      } catch (err) {
        console.warn("Invalid return_url:", rawReturnUrl, err);
        return "";
      }
    }

    function setReturnLinks(autoFeedback = "0") {
      const url = buildSafeReturnUrl(autoFeedback);
      if (url) {
        returnBtn.href = url;
        manualReturnBtn.href = url;
        returnBtn.style.display = "inline-block";
        manualReturnBtn.style.display = "inline-block";
      } else {
        returnBtn.style.display = "none";
        manualReturnBtn.style.display = "none";
      }
    }

    function appendTranscriptLineToDOM(speaker, text) {
      const line = document.createElement("div");
      line.className = "line";
      line.textContent = `${speaker}: ${text}`;
      transcriptEl.appendChild(line);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    function addTranscriptLine(speaker, text) {
      if (!text) return;
      transcriptLines.push({ speaker, text });
      appendTranscriptLineToDOM(speaker, text);
    }

    async function saveTranscriptToServer() {
      if (transcriptSaved) return true;

      if (!SESSION_ID) {
        statusEl.textContent = "Missing session ID. Transcript cannot be saved.";
        return false;
      }

      try {
        const finalEndTime = sessionEndTime || isoNow();

        const payload = {
          session_id: SESSION_ID,
          study_number: STUDY_NUMBER || null,
          interaction_mode: INTERACTION_MODE || "Realtime voice",
          age_group: AGE_GROUP || null,
          system: SYSTEM || null,
          caregiver_name: CAREGIVER_NAME || null,
          caregiver_gender: CAREGIVER_GENDER || null,
          caregiver_role: CAREGIVER_ROLE || null,
          child_name: CHILD_NAME || null,
          presenting_complaint: PRESENTING_COMPLAINT || null,
          case_summary: CASE_SUMMARY || null,
          opening_line: OPENING_LINE || null,
          started_at: sessionStartTime,
          ended_at: finalEndTime,
          duration_seconds: durationSeconds(sessionStartTime, finalEndTime),
          session_completed: sessionFinished,
          timeout_reason: timeoutReason,
          transcript_lines: transcriptLines,
          transcript_text: transcriptLines.map(x => `${x.speaker}: ${x.text}`).join("\n")
        };

        const response = await fetch("/save_transcript", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`Save failed with status ${response.status}`);
        }

        transcriptSaved = true;
        return true;
      } catch (err) {
        console.error("Could not save transcript:", err);
        statusEl.textContent = "Could not save transcript";
        return false;
      }
    }

    function resetUiForNewSession() {
      sessionFinished = false;
      openingLineSeen = false;
      transcriptLines = [];
      transcriptSaved = false;
      stopInProgress = false;
      pendingAutoFeedback = "0";
      sessionStartTime = null;
      sessionEndTime = null;
      lastStudentSpeechTime = null;
      warningIssued = false;
      timeoutReason = null;
      awaitingFeedbackChoice = false;

      if (timerHandle) {
        clearInterval(timerHandle);
        timerHandle = null;
      }

      transcriptEl.innerHTML = "";
      returnSection.style.display = "none";
      warningSection.style.display = "none";
      setReturnLinks("0");
    }

    function showReturnSection() {
      returnSection.style.display = "block";
      warningSection.style.display = "none";
    }

    function showIncompleteWarning() {
      warningSection.style.display = "block";
      returnSection.style.display = "none";
    }

    function isPreceptorInvite(botText) {
      return normalizeText(botText) === normalizeText(PRECEPTOR_INVITE_LINE);
    }

    function isDiagnosisQuestion(botText) {
      return normalizeText(botText) === normalizeText(DIAGNOSIS_QUESTION);
    }

    function isDifferentialsQuestion(botText) {
      return normalizeText(botText) === normalizeText(DIFFERENTIALS_QUESTION);
    }

    function isFeedbackQuestion(botText) {
      return normalizeText(botText) === normalizeText(FEEDBACK_QUESTION);
    }

    async function tearDownSession() {
      if (timerHandle) {
        clearInterval(timerHandle);
        timerHandle = null;
      }

      if (dc) {
        try { dc.close(); } catch {}
        dc = null;
      }

      if (pc) {
        try {
          pc.ontrack = null;
          pc.onconnectionstatechange = null;
          pc.close();
        } catch {}
        pc = null;
      }

      if (localStream) {
        localStream.getTracks().forEach(track => {
          try { track.stop(); } catch {}
        });
        localStream = null;
      }

      remoteAudioEl.srcObject = null;
      startBtn.disabled = true;
      stopBtn.disabled = true;
    }

    async function completeAndReturn(autoFeedback = "1") {
      sessionFinished = true;
      pendingAutoFeedback = autoFeedback;
      sessionEndTime = isoNow();
      setReturnLinks(autoFeedback);

      statusEl.textContent = autoFeedback === "1"
        ? "Session complete. Saving transcript and returning for feedback..."
        : "Session complete. Saving transcript and returning...";

      await saveTranscriptToServer();
      await tearDownSession();
      showReturnSection();

      const targetUrl = buildSafeReturnUrl(autoFeedback);
      if (targetUrl) {
        window.location.href = targetUrl;
      }
    }

    async function forceTimeoutReturn(reason) {
      if (sessionFinished || stopInProgress) return;

      timeoutReason = reason;
      sessionFinished = true;
      pendingAutoFeedback = "1";
      sessionEndTime = isoNow();

      if (reason === "inactivity") {
        addTranscriptLine("Bot", "Session ended due to inactivity. Returning for feedback now.");
        speakLocalMessage("There has been no speech for five minutes. The session is ending now.");
      } else if (reason === "max_duration") {
        addTranscriptLine("Bot", "Session ended because the 30 minute limit was reached. Returning for feedback now.");
        speakLocalMessage("The 30 minute session limit has been reached. The session is ending now.");
      }

      await completeAndReturn("1");
    }

    function startTimers() {
      timerHandle = setInterval(async () => {
        if (sessionFinished || stopInProgress) return;

        const totalElapsed = elapsedMs();

        if (!warningIssued && totalElapsed >= WARNING_AT_MS) {
          warningIssued = true;
          const warningText = "You have five minutes left in this session.";
          addTranscriptLine("Bot", warningText);
          speakLocalMessage(warningText);
          statusEl.textContent = "Five-minute warning issued";
        }

        if (totalElapsed >= HARD_STOP_AT_MS) {
          await forceTimeoutReturn("max_duration");
          return;
        }

        if (msSinceLastStudentSpeech() >= INACTIVITY_LIMIT_MS) {
          await forceTimeoutReturn("inactivity");
        }
      }, 15000);
    }

    async function startSession() {
      if (autoStarted) return;
      autoStarted = true;

      try {
        resetUiForNewSession();
        sessionStartTime = isoNow();
        lastStudentSpeechTime = sessionStartTime;
        statusEl.textContent = "Accessing microphone...";

        const normalizedOpeningLine = normalizeText(OPENING_LINE);

        if (!SESSION_ID) {
          statusEl.textContent = "Missing session ID. Please return to the main app and start a new case.";
          return;
        }

        pc = new RTCPeerConnection();

        pc.ontrack = (event) => {
          remoteAudioEl.srcObject = event.streams[0];
        };

        pc.onconnectionstatechange = () => {
          if (!sessionFinished && !stopInProgress && pc) {
            statusEl.textContent = `Connection state: ${pc.connectionState}`;
          }
        };

        dc = pc.createDataChannel("oai-events");

        dc.onopen = () => {
          if (!sessionFinished && !stopInProgress) {
            statusEl.textContent = "Connected";
          }
        };

        dc.onmessage = async (event) => {
          try {
            const msg = JSON.parse(event.data);
            console.log("Realtime event:", msg);

            if (sessionFinished || stopInProgress) return;

            if (msg.type === "conversation.item.input_audio_transcription.completed") {
              if (msg.transcript) {
                addTranscriptLine("Student", msg.transcript);
                lastStudentSpeechTime = isoNow();

                if (awaitingFeedbackChoice && isYes(msg.transcript)) {
                  awaitingFeedbackChoice = false;
                  await completeAndReturn("1");
                  return;
                }
              }
              return;
            }

            if (msg.type === "response.output_item.done") {
              const item = msg.item;
              if (!item || !item.content) return;

              const transcriptPart = item.content.find(c => c.transcript);
              if (!transcriptPart || !transcriptPart.transcript) return;

              const botText = transcriptPart.transcript;
              const normalizedBotText = normalizeText(botText);

              if (normalizedBotText === normalizedOpeningLine) {
                if (!openingLineSeen) {
                  openingLineSeen = true;
                  addTranscriptLine("Bot", botText);
                }
                return;
              }

              addTranscriptLine("Bot", botText);

              if (isPreceptorInvite(botText)) {
                statusEl.textContent = "Preceptor handoff offered";
                return;
              }

              if (isDiagnosisQuestion(botText)) {
                statusEl.textContent = "Diagnosis question";
                return;
              }

              if (isDifferentialsQuestion(botText)) {
                statusEl.textContent = "Differentials question";
                return;
              }

              if (isFeedbackQuestion(botText)) {
                awaitingFeedbackChoice = true;
                statusEl.textContent = "Waiting for assessment choice";
                return;
              }

              return;
            }

            if (msg.type === "error") {
              console.error("Realtime error:", msg);
              if (!sessionFinished && !stopInProgress) {
                statusEl.textContent = "Realtime error - check console";
              }
            }
          } catch (e) {
            console.error("Event parse error", e, event.data);
          }
        };

        try {
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (err) {
          if (err && err.name === "NotAllowedError") {
            statusEl.textContent = "Microphone access was denied. Please allow microphone access and try again.";
            return;
          }
          throw err;
        }

        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        statusEl.textContent = "Creating WebRTC offer...";
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        statusEl.textContent = "Connecting to server...";
        const query = new URLSearchParams({
          age_group: AGE_GROUP,
          system: SYSTEM,
          caregiver_name: CAREGIVER_NAME,
          caregiver_gender: CAREGIVER_GENDER,
          caregiver_role: CAREGIVER_ROLE,
          child_name: CHILD_NAME,
          presenting_complaint: PRESENTING_COMPLAINT,
          case_summary: CASE_SUMMARY,
          opening_line: OPENING_LINE,
          session_id: SESSION_ID,
          study_number: STUDY_NUMBER,
          interaction_mode: INTERACTION_MODE
        }).toString();

        const sdpResponse = await fetch(`/session?${query}`, {
          method: "POST",
          body: offer.sdp,
          headers: { "Content-Type": "application/sdp" }
        });

        if (!sdpResponse.ok) {
          const errText = await sdpResponse.text();
          throw new Error(`SDP exchange failed: ${sdpResponse.status} ${errText}`);
        }

        const answer = {
          type: "answer",
          sdp: await sdpResponse.text()
        };

        await pc.setRemoteDescription(answer);

        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusEl.textContent = "Live session running";
        startTimers();

      } catch (err) {
        console.error(err);
        statusEl.textContent = `Error: ${err.message}`;
        await tearDownSession();
      }
    }

    async function stopSession() {
      if (stopInProgress) return;
      stopInProgress = true;

      if (!sessionEndTime) {
        sessionEndTime = isoNow();
      }

      // If the user manually stops but there is a transcript, still return for feedback.
      const hasTranscript = transcriptLines.length > 0;

      if (!sessionFinished && hasTranscript) {
        sessionFinished = true;
        pendingAutoFeedback = "1";
      }

      await saveTranscriptToServer();
      await tearDownSession();

      if (sessionFinished) {
        statusEl.textContent = "Session complete";
        const targetUrl = buildSafeReturnUrl(pendingAutoFeedback || "1");
        if (targetUrl) {
          window.location.href = targetUrl;
          return;
        }
        showReturnSection();
      } else {
        statusEl.textContent = "Session stopped before completion";
        showIncompleteWarning();
      }

      stopInProgress = false;
    }

    stopBtn.addEventListener("click", stopSession);

    window.addEventListener("load", () => {
      setReturnLinks("0");
      startSession();
    });
  </script>
</body>
</html>
